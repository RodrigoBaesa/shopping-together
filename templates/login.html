{% extends "layout.html" %}

{% block title %}
    Login
{% endblock %}

{% block main %}
    <div class="container d-flex justify-content-center align-items-center flex-grow-1">
        <form class="login-form p-5 shadow-lg" action="/register" method="post">
            <h1 class="mb-4 d-flex justify-content-center">Sign In</h1>
            
            <div class="mb-3 text-start">
                <label for="exampleInputEmail1" class="form-label">Email address</label>
                <input type="email" name="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required>
                <div id="emailHelp" class="form-text text-white-50">We'll never share your email with anyone else.</div>
            </div>
            
            <div class="mb-4 text-start">
                <label for="exampleInputPassword1" class="form-label">Password</label>
                <input type="password" name="password" class="form-control" id="exampleInputPassword1" required>
            </div>

            <div class="m-4 d-flex justify-content-center">
                <a href="/register" style="color: lightblue">Don't have an account? Sign Up</a>
            </div>
            
            <div class="d-grid d-flex justify-content-center">
                <button type="submit" class="btn btn-primary btn-lg">Submit</button>
            </div>
        </form>
    </div>
{% endblock %}
