{% extends "layout.html" %}

{% block title %}
    Login
{% endblock %}

{% block main %}
    <div class="container d-flex justify-content-center align-items-center flex-grow-1">
        <form class="login-form p-5 shadow-lg" action="/login" method="post">
            <h1 class="mb-4 d-flex justify-content-center">Sign In</h1>
            
            <div class="mb-3 text-start">
                <label for="exampleInputEmail1" class="form-label">Email address</label>
                <input type="email" name="email" class="form-control" id="email" autocomplete="off" required>
            </div>
            
            <div class="mb-4 text-start">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" class="form-control" id="password" required>
            </div>

            <div class="m-4 d-flex justify-content-center">
                <a href="/register" style="color: violet">Don't have an account? Sign Up</a>
            </div>
            
            <div class="d-grid d-flex justify-content-center">
                <button type="submit" class="btn btn-primary btn-lg">Submit</button>
            </div>
        </form>
    </div>
{% endblock %}
