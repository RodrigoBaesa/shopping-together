{% extends "layout.html" %}

{% block title %}
    Create Family
{% endblock %}

{% block main %}
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10 col-md-6 m-5 ">
                <form action="/create-family" method="post">
                    <label for="name" class="form-label text-white fw-semibold d-block text-center">Family Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter family name" id="name" autocomplete="off" required maxlength="40">
                    <div class="d-flex justify-content-center m-4">
                        <button type="submit" class="btn btn-warning">Create New Family</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
