{% extends "layout.html" %}

{% block title %}
    Create List
{% endblock %}

{% block main %}
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10 col-md-6 m-5 ">
                <form action="/create-list" method="post">
                    <label for="title" class="form-label text-white fw-semibold d-block text-center">List Title</label>
                    <input type="text" name="title" class="form-control" placeholder="Basic groceries of the month" id="title" autocomplete="off" required>
                    <div class="d-flex justify-content-center m-4">
                        <button type="submit" class="btn btn-warning">Create New List</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
