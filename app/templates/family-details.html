{% extends "layout.html" %}

{% block title %}
    Family Details
{% endblock %}

{% block main %}
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10 col-md-8 m-5">
                <h2 class="text-white text-center mb-4">{{ family.name }}</h2>
                
                <h3 class="text-white mb-3">Family Members</h3>
                <ul class="list-group">
                    {% for member in members %}
                    <li class="list-group-item bg-dark text-white">{{ member.username }}</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
{% endblock %}
